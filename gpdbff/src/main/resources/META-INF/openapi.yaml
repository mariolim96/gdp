        dataAcquisizione:
          type: string
          format: date-time
        nroTotFile:
          type: integer
        esito:
          type: string
          example: '<WRN>Avviso: NL – page003.pdf</WRN>'
          description: Raw status string with rendering tags.
        tipoEdizioneCode:
