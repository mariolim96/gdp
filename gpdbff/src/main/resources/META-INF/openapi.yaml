        idLog:
          type: integer
          format: int32
        idTestata:
          type: integer
          format: int32
        nomeTestata:
          type: string
        tipoEdizione:
          $ref: '#/components/schemas/TipoEdizione'
        dataEdizione:
          type: string
          format: date
        dataAcquisizione:
          type: string
          format: date-time
        nroTotFileAcq:
