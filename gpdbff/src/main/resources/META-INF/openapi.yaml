        For utentePrivilegiato: idFascicolo present, temporaneo=false.

        '
      properties:
        idFascicolo:
          type: integer
          format: int32
          example: 42
        temporaneo:
          type: boolean
          example: false
        creazione:
          type: string
          format: date-time
        pdf:
          type: string
          format: byte
          description: Base64-encoded PDF (utenteWeb only)
