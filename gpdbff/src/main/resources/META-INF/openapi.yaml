            $ref: '#/components/schemas/AcquisizioneHistoricalEdition'
    MailComposition:
      type: object
      required:
        - from
        - to
        - host
        - porta
        - oggetto
        - testo
      properties:
        from:
          type: string
          format: email
          example: assistenza.bdp@csi.it
          description: Sender address. From GDP_MAIL.MITTENTE.
        to:
          type: string
          format: email
          example: editore@testata.it
        host:
          type: string
          example: mailfarm-app.csi.it
          description: SMTP host. From GDP_MAIL.SMTP_MAIL_HOST.
        porta:
          type: integer
          example: 25
          description: SMTP port. From GDP_MAIL.SMTP_MAIL_PORTA.
        oggetto:
          type: string
          example: Edizione del 01/03/2026 - La Sentinella del Canavese
        testo:
          type: string
          example: Gentile editore, si segnala un'anomalia...
    DamStatusResponse:
      type: object
      required:
        - jobId
