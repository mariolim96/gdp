        '404':
          $ref: '#/components/responses/NotFound'
  /fo/edizioni/{idEdizione}/pagine/{numPagina}:
    parameters:
      - $ref: '#/components/parameters/idEdizione'
      - name: numPagina
        in: path
        required: true
        schema:
          type: integer
          minimum: 1
    get:
      tags:
        - fo-edizioni
      operationId: getFoPaginaPdf
      summary: PDF stream of a specific page
      security:
        - bearerAuth: []
        - {}
      description: 'Retrieves PDF from DAM LIBRA and streams to client.

        Uses chunked transfer encoding — no full in-memory buffering.

        '
      responses:
        '200':
          description: PDF page stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /fo/fascicoli:
    get:
      tags:
        - fo-fascicoli
      operationId: getFoFascicoli
      summary: List user's fascicoli
      description: utentePrivilegiato only. Reads from GDP_FASCICOLO filtered by user
        identity.
      security:
        - bearerAuth:
            - utentePrivilegiato
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FascicoloList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - fo-fascicoli
      operationId: postFoFascicolo
      summary: Create a new fascicolo
      security:
        - bearerAuth: []
        - {}
      description: 'Assembles PDF from individual LIBRA pages using Apache PDFBox
        3.x.

        - utenteWeb: PDF generated on-the-fly, not persisted. Returns base64 PDF.

        - utentePrivilegiato: persisted to GDP_FASCICOLO. Returns idFascicolo.

        Up to 50 pages: synchronous (201). More than 50: async (202 + jobId).

        '
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FascicoloRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FascicoloCreatedResponse'
        '202':
          description: Accepted — async assembly for large fascicoli
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /fo/fascicoli/{idFascicolo}:
    parameters:
      - $ref: '#/components/parameters/idFascicolo'
    get:
      tags:
        - fo-fascicoli
      operationId: getFoFascicoloById
      summary: Retrieve an existing fascicolo
      description: utentePrivilegiato only — 404 for utenteWeb.
      security:
        - bearerAuth:
            - utentePrivilegiato
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FascicoloDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - fo-fascicoli
      operationId: putFoFascicolo
      summary: Add/remove pages from existing fascicolo (SHOULD)
      description: 'utentePrivilegiato only.

        PDF is regenerated at next download request.

        '
      security:
        - bearerAuth:
            - utentePrivilegiato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FascicoloUpdateRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FascicoloDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
        - fo-fascicoli
      operationId: deleteFoFascicolo
      summary: Delete a fascicolo
      description: utentePrivilegiato only.
      security:
        - bearerAuth:
            - utentePrivilegiato
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /fo/fascicoli/{idFascicolo}/pdf:
    parameters:
      - $ref: '#/components/parameters/idFascicolo'
    get:
      tags:
        - fo-fascicoli
      operationId: getFoFascicoloPdf
      summary: Download fascicolo PDF
      security:
        - bearerAuth: []
        - {}
      description: '- utentePrivilegiato: serves saved PDF.

        - utenteWeb: generates PDF on-the-fly (page assembly).

        '
      responses:
        '200':
          description: PDF stream
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /fo/preferiti:
    get:
      tags:
        - fo-preferiti
      operationId: getFoPreferiti
      summary: List user's favourite testate and editions
      description: utentePrivilegiato only.
      security:
        - bearerAuth:
            - utentePrivilegiato
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreferitiList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - fo-preferiti
      operationId: postFoPreferito
      summary: Add a testata or edition to favourites (SHOULD)
      security:
        - bearerAuth:
            - utentePrivilegiato
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PreferitoRequest'
      responses:
        '201':
          description: Created
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /fo/preferiti/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
    delete:
      tags:
        - fo-preferiti
      operationId: deleteFoPreferito
      summary: Remove item from favourites (SHOULD)
      security:
        - bearerAuth:
            - utentePrivilegiato
      responses:
        '204':
          description: No Content
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: 'JWT issued by Shibboleth SSO (operatore) or IAM RUPAR (utentePrivilegiato).

        Validated by SmallRye JWT. Roles extracted from JWT claims.

        '
  parameters:
    idTestata:
      name: idTestata
      in: path
      required: true
      schema:
        type: integer
        format: int32
    idLog:
      name: idLog
      in: path
      required: true
      schema:
        type: integer
        format: int32
    idEdizione:
      name: idEdizione
      in: path
      required: true
      schema:
        type: integer
        format: int32
    idFascicolo:
      name: idFascicolo
      in: path
      required: true
      schema:
        type: integer
        format: int32
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Backend system unavailable (gdporch or DAM LIBRA)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required:
        - codice
        - messaggio
        - timestamp
      properties:
        codice:
          type: string
          enum:
            - BACKEND_UNAVAILABLE
            - VALIDATION_ERROR
            - NOT_FOUND
            - FORBIDDEN
            - INTERNAL_ERROR
          example: VALIDATION_ERROR
        messaggio:
          type: string
          example: Parametro obbligatorio mancante
        dettagli:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        timestamp:
          type: string
          format: date-time
          example: '2026-03-01T10:00:00Z'
    ErrorDetail:
      type: object
      properties:
        campo:
          type: string
          example: dataInizio
        errore:
          type: string
          example: Il campo è obbligatorio
    AsyncJobResponse:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          example: a3f2c1d0-1234-5678-abcd-ef0123456789
        message:
          type: string
          example: Processing started
        status:
          type: string
          enum:
            - PROCESSING
            - COMPLETED
            - FAILED
          example: PROCESSING
    DateRangeRequest:
      type: object
      required:
        - dataInizio
        - dataFine
      properties:
        dataInizio:
          type: string
          format: date
          example: '2026-01-01'
        dataFine:
          type: string
          format: date
          example: '2026-12-31'
        idTestata:
          type: integer
          format: int32
          nullable: true
    TestataSummary:
      type: object
      required:
        - idTestata
        - nomeTestata
        - cartellaTestata
      properties:
        idTestata:
          type: integer
          format: int32
          example: 1
        nomeTestata:
          type: string
          example: La Sentinella del Canavese
        cartellaTestata:
          type: string
          example: sentinella
        invioEdizione:
          type: boolean
          example: true
        provincia:
          type: string
          example: TO
    TestataSummaryList:
      type: object
      required:
        - testate
      properties:
        testate:
          type: array
          items:
            $ref: '#/components/schemas/TestataSummary'
    TestataDetail:
      type: object
      required:
        - idTestata
        - nomeTestata
      properties:
        idTestata:
          type: integer
          format: int32
          example: 1
        nomeTestata:
          type: string
          example: La Sentinella del Canavese
        cartellaTestata:
          type: string
        stato:
          type: integer
          description: '0 = attiva, 1 = storica. Maps to GDP_TESTATA.STATO.

            '
          example: 0
        cancellazione:
          type: string
        dataStato:
          type: string
          format: date
        codTema:
          type: string
        tema:
          type: string
        descrizione:
          type: string
        mail:
          type: string
          format: email
        cap:
          type: string
        codEditrice:
          type: string
        annoFondazione:
          type: integer
        periodoDal:
          type: string
        periodoAl:
          type: string
        sitoWeb:
          type: string
          format: uri
        entePropietario:
          type: string
        invioEdizione:
          type: boolean
          description: True = testata sends periodic editions. Maps to DB column INVIO_EDIZIONE.
        comune:
          type: string
        indirizzo:
          type: string
        latitudine:
          type: number
          format: double
        longitudine:
          type: number
          format: double
        provincia:
          type: string
    TestataPublic:
      type: object
      required:
        - idTestata
        - nomeTestata
      description: Public fields only — no SFTP or internal configuration data.
      properties:
        idTestata:
          type: integer
          format: int32
        nomeTestata:
          type: string
        provincia:
          type: string
        comune:
          type: string
        sitoWeb:
          type: string
          format: uri
        entePropietario:
          type: string
        annoFondazione:
          type: integer
        periodoDal:
          type: string
        periodoAl:
          type: string
        stato:
          type: integer
          description: 0 = attiva, 1 = storica
          example: 0
    Periodicita:
      type: object
      required:
        - idPeriodicita
        - idTestata
      properties:
        idPeriodicita:
          type: integer
          format: int32
          example: 1
        idTestata:
          type: integer
          format: int32
          example: 1
        mensilita:
          type: integer
          format: int32
          example: 0.5
          description: 'Monthly interval as integer (DB: GDP_PERIODICITA.MENSILITA
            integer).

            0 = sub-monthly weekly pattern.

            1 = monthly, 2 = bimonthly, 3 = quarterly, 4 = every 4 months,

            6 = semi-annual, 12 = annual.

            Note: bimensile/quindicinale (twice-monthly) uses GG_PERIODICITA with
            two dates

            (e.g. G01;G15) while MENSILITA=1.

            '
        ggPeriodicita:
          type: string
          example: G01;G15
          description: 'Publication day pattern.

            Monthly: G01, G15, G1S6 (first Saturday), etc.

            Sub-monthly: 1WS0 (daily), 1WS3 (every Wednesday), 2WS7 (every other Sunday),
            etc.

            '
        inizioSospensione:
          type: string
          format: date
          example: '2026-01-01'
        fineSospensione:
          type: string
          format: date
          example: '2026-01-31'
    DataAttesa:
      type: object
      required:
        - data
        - sospesa
      properties:
        data:
          type: string
          format: date
          example: '2026-03-01'
        sospesa:
          type: boolean
          example: false
    DateAttesePerTestata:
      type: object
      required:
        - idTestata
        - cartellaTestata
      properties:
        idTestata:
          type: integer
          format: int32
        cartellaTestata:
          type: string
          description: Added in SFU-01 v2
        dateAttese:
          type: array
          items:
            $ref: '#/components/schemas/DataAttesa'
        nroEdizioniAttese:
          type: integer
    DateAtteseList:
      type: object
      required:
        - testate
      properties:
        testate:
          type: array
          items:
            $ref: '#/components/schemas/DateAttesePerTestata'
    SospensioneResponse:
      type: object
      required:
        - giorniSospesi
        - message
      properties:
        giorniSospesi:
          type: integer
          example: 5
        message:
          type: string
          example: Editions suspended successfully
    UtenteSftp:
      type: object
      required:
        - id
        - idTestata
        - username
        - ruolo
        - stato
      properties:
        id:
          type: integer
          format: int32
        idTestata:
          type: integer
          format: int32
        username:
          type: string
        homeFtp:
          type: string
        referenteFtp:
          type: string
        email:
          type: string
          format: email
        ruolo:
          type: string
          enum:
            - utenteFTP
            - utenteWEB
        stato:
          type: string
          enum:
            - attivo
            - sospeso
    UtenteSftpRequest:
      type: object
      required:
        - idTestata
        - username
        - password
        - ruolo
        - stato
      properties:
        idTestata:
          type: integer
          format: int32
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 8
          writeOnly: true
        homeFtp:
          type: string
        referenteFtp:
          type: string
        email:
          type: string
          format: email
        ruolo:
          type: string
          enum:
            - utenteFTP
            - utenteWEB
        stato:
          type: string
          enum:
            - attivo
            - sospeso
    UtenteSftpList:
      type: object
      required:
        - utenti
      properties:
        utenti:
          type: array
          items:
            $ref: '#/components/schemas/UtenteSftp'
    AcquisizioneSummary:
      type: object
      required:
        - idLog
      properties:
        idLog:
          type: integer
          format: int32
        idUtenteSFTP:
          type: integer
          format: int32
        idTestata:
          type: integer
          format: int32
        nomeTestata:
          type: string
          example: La Sentinella del Canavese
        nroEdizioni:
          type: integer
          description: Always 1 for tipo=G; count of GDP_LOG_EDIZIONE for tipo=S
        tipoEdizione:
          type: string
          description: Human-readable description from GDP_TIPO_EDIZIONE.
          example: Regolare
        dataEdizione:
          type: string
          format: date
        dataAcquisizione:
          type: string
          format: date-time
        nroTotFile:
          type: integer
        esito:
          type: string
          example: <MSG>Elaborazione OK</MSG>
          description: 'Raw status string containing rendering tags mapping to UC-05:

            <MSG> = OK (white text, green background)

            <WRN> = Warning (blue text, yellow background)

            <Ennn> = Error (yellow text, red background)

            '
    AcquisizioneList:
      type: object
      required:
        - acquisizioni
      properties:
        acquisizioni:
          type: array
          items:
            $ref: '#/components/schemas/AcquisizioneSummary'
