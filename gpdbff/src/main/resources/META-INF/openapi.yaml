openapi: 3.1.0
info:
  title: gdpbff — Backend For Frontend API
  description: 'Single HTTP entry point for gdpbospa (Back Office) and gdpfospa (Front
    Office) SPAs.

    System: GDP — Giornali del Piemonte. Client: Consiglio Regionale del Piemonte.

    Version: 1.0-rev2 (March 2026).


    ## Data Sources per endpoint group

    - `/bo/testate` (GET) — delegates to gdporch F16/F17

    - `/bo/testate/{id}` (PUT), `/bo/testate/periodicita` (GET) — direct DB via Panache

    - `/bo/testate/periodicita` (PUT) — direct DB + async F01 on gdporch

    - `/bo/testate/date-attese`, `/bo/testate/sospensioni` — delegates to gdporch
    F18/F05

    - `/bo/utenti-sftp/**` — direct DB via Panache

    - `/bo/acquisizioni/**` — delegates to gdporch F12-F15, F20-F22

    - `/bo/pagine/oblio` — direct DB + DAM LIBRA

    - `/fo/ricerca/**` — delegates to DAM LIBRA (search API)

    - `/fo/testate/**`, `/fo/edizioni/**` — direct DB via Panache

    - `/fo/edizioni/{id}/pagine/{n}` — streams from DAM LIBRA

    - `/fo/fascicoli/**`, `/fo/preferiti/**` — direct DB via Panache + PDFBox


    ## Authentication

    - `/bo/**` — operatore role (Shibboleth SSO → JWT)

    - `/fo/**` — anonymous (utenteWeb) or utentePrivilegiato (IAM RUPAR → JWT)


    ## Visibility Rule

    For utenteWeb: editions with DATA_PUBBLICAZIONE > CURRENT_DATE are excluded.'
  version: 1.0.0-rev2
  contact:
    name: CSI Piemonte — Team GDP
servers:
  - url: https://gdp.cr.piemonte.it/api
    description: Production
tags:
  - name: bo-testate
    description: Back Office — Testata Management (UC-02)
  - name: bo-sftp-utenti
    description: Back Office — SFTP User Management (UC-01)
  - name: bo-acquisizioni
    description: Back Office — Acquisition Monitoring (F12–F15)
  - name: bo-pagine
    description: Back Office — GDPR Right to Oblio
  - name: fo-ricerca
    description: Front Office — Archive Search (UC — Scenario 6)
  - name: fo-testate
    description: Front Office — Testata Catalogue
  - name: fo-edizioni
    description: Front Office — Editions
  - name: fo-fascicoli
    description: Front Office — Fascicoli (UC — Scenario 7)
  - name: fo-preferiti
    description: Front Office — Favourites (UC — Scenario 7)
security:
  - bearerAuth: []
paths:
  /bo/testate:
    get:
      tags:
        - bo-testate
      operationId: getBoTestate
      summary: Filtered testata list
      description: 'Returns list of testate with optional mutually-exclusive filters.

        Delegates to `F16 — DB.getElencoTestate` on gdporch.

        Only one filter parameter may be provided at a time.

        '
      security:
        - bearerAuth:
            - operatore
      parameters:
        - name: invioEdizione
          in: query
          description: Filter senders only (true=solo invianti)
          schema:
            type: boolean
        - name: prov
          in: query
          description: Filter by province code (e.g. TO, CN)
          schema:
            type: string
        - name: idTestata
          in: query
          description: Filter by specific testata ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestataSummaryList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/testate/{idTestata}:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    get:
      tags:
        - bo-testate
      operationId: getBoTestataById
      summary: Complete anagrafica of a specific testata
      description: Returns all GDP_TESTATA fields. Delegates to `F17 — DB.getTestata`
        on gdporch.
      security:
        - bearerAuth:
            - operatore
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestataDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    put:
      tags:
        - bo-testate
      operationId: putBoTestata
      summary: Update testata anagrafica
      description: Update testata description, state, address, etc. Direct DB write
        via Panache.
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TestataDetail'
      responses:
        '200':
          description: Updated testata
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestataDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /bo/testate/{idTestata}/periodicita:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    get:
      tags:
        - bo-testate
      operationId: getBoPeriodicita
      summary: Read testata periodicity configuration
      description: Direct DB read from GDP_PERIODICITA.
      security:
        - bearerAuth:
            - operatore
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Periodicita'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - bo-testate
      operationId: putBoPeriodicita
      summary: Update periodicity — triggers async date recalculation
      description: 'Updates GDP_PERIODICITA then invokes `F01 — configDTEdizioneAttesa`
        on gdporch

        asynchronously. Returns 202 with jobId for polling.

        '
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Periodicita'
      responses:
        '202':
          description: Accepted — async processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /bo/testate/{idTestata}/date-attese:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    get:
      tags:
        - bo-testate
      operationId: getBoDateAttese
      summary: List expected dates for a period
      description: Delegates to `F18 — FTPregolare.verifDateAttese` on gdporch.
      security:
        - bearerAuth:
            - operatore
      parameters:
        - name: dataInizio
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-01-01'
        - name: dataFine
          in: query
          required: true
          schema:
            type: string
            format: date
            example: '2026-12-31'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DateAtteseList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
        - bo-testate
      operationId: postBoDateAttese
      summary: Generate expected dates for a period
      description: 'Invokes `F01 — configDTEdizioneAttesa` on gdporch asynchronously.

        Returns 202 Accepted with jobId.

        '
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DateRangeRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /bo/testate/{idTestata}/sospensioni:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    get:
      tags:
        - bo-testate
      operationId: getBoSospensioni
      summary: Expected dates with suspension status
      description: Delegates to `F18 — verifDateAttese` on gdporch.
      security:
        - bearerAuth:
            - operatore
      parameters:
        - name: dataInizio
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: dataFine
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DateAtteseList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
        - bo-testate
      operationId: postBoSospensioni
      summary: Suspend editions for a period
      description: 'Delegates to `F05 — sospensioneEdizioneAttesa` on gdporch (synchronous).

        Returns number of suspended days.

        '
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DateRangeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SospensioneResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/utenti-sftp:
    get:
      tags:
        - bo-sftp-utenti
      operationId: getBoUtentiSftp
      summary: List SFTP users
      security:
        - bearerAuth:
            - operatore
      parameters:
        - name: stato
          in: query
          schema:
            type: string
            enum:
              - attivo
              - sospeso
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtenteSftpList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags:
        - bo-sftp-utenti
      operationId: postBoUtenteSftp
      summary: Register new SFTP user
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtenteSftpRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtenteSftp'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /bo/utenti-sftp/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: integer
          format: int32
    get:
      tags:
        - bo-sftp-utenti
      operationId: getBoUtenteSftpById
      summary: SFTP user detail
      security:
        - bearerAuth:
            - operatore
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtenteSftp'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags:
        - bo-sftp-utenti
      operationId: putBoUtenteSftp
      summary: Update SFTP user (role, status, password)
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UtenteSftpRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UtenteSftp'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /bo/acquisizioni:
    get:
      tags:
        - bo-acquisizioni
      operationId: getBoAcquisizioni
      summary: List acquisitions by date and type
      description: Delegates to `F12 — MONITOR.elencoAcquisizioni` on gdporch.
      security:
        - bearerAuth:
            - operatore
      parameters:
        - name: data
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: tipo
          in: query
          required: true
          description: G=daily (giornaliera), S=historical (storica)
          schema:
            type: string
            enum:
              - G
              - S
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisizioneList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/acquisizioni/ricerca:
    get:
      tags:
        - bo-acquisizioni
      operationId: getBoAcquisizioniRicerca
      summary: Historical search of acquisitions (multi-criteria)
      description: 'Historical search with multi-criteria filtering.

        Delegates to `F15 — MONITOR.ricercaAcquisizioni` on gdporch.

        '
      security:
        - bearerAuth:
            - operatore
      parameters:
        - name: tipoAcquisizione
          in: query
          required: true
          schema:
            type: string
            enum:
              - G
              - S
        - name: idTestata
          in: query
          required: false
          schema:
            type: integer
            format: int32
        - name: dataDA
          in: query
          schema:
            type: string
            format: date
        - name: dataA
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: tipoEdizione
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/TipoEdizione'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisizioneRicercaList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/acquisizioni/{idLog}:
    parameters:
      - $ref: '#/components/parameters/idLog'
    get:
      tags:
        - bo-acquisizioni
      operationId: getBoAcquisizioneDetail
      summary: Acquisition detail
      description: 'Pages OK/KO, edition type decoded, anomalies, XML/ZIP flags.

        Delegates to `F13 — MONITOR.dettaglioAcquisizione` on gdporch.

        '
      security:
        - bearerAuth:
            - operatore
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisizioneDetail'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/acquisizioni/{idLog}/edizioni-storiche:
    parameters:
      - $ref: '#/components/parameters/idLog'
    get:
      tags:
        - bo-acquisizioni
      operationId: getBoAcquisizioneEdizioniStoriche
      summary: Edition list for a historical delivery
      description: 'Returns the list of editions contained in a historical delivery.

        Delegates to `F13 — MONITOR.dettaglioAcquisizione` on gdporch.

        '
      security:
        - bearerAuth:
            - operatore
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisizioneHistoricalEditionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/acquisizioni/{idLog}/stato-dam:
    parameters:
      - $ref: '#/components/parameters/idLog'
    get:
      tags:
        - bo-acquisizioni
      operationId: getBoAcquisizioneStatoDam
      summary: Check real-time DAM processing status
      description: 'Checks the current status of the DAM import job associated with
        this acquisition.

        Delegates to `F20 — MONITOR.statoDAM` on gdporch.

        '
      security:
        - bearerAuth:
            - operatore
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DamStatusResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/acquisizioni/{idLog}/mail/prepara:
    parameters:
      - $ref: '#/components/parameters/idLog'
    post:
      tags:
        - bo-acquisizioni
      operationId: postBoAcquisizioneMailPrepara
      summary: Prepare mail notification for an anomalous acquisition
      description: 'Composes the email payload (subject, body) using a template from
        DB.

        Does NOT send the email. Delegates to `F14 — MONITOR.preparaMAIL`.

        '
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tipoMail
              properties:
                tipoMail:
                  type: string
                  enum:
                    - GW001
                    - GE001
                    - SW001
                    - SE001
                    - ST001
                  description: 'GW001=Daily integration warning (edizione da integrare),

                    GE001=Daily error (edizione non caricata),

                    SW001=Historical integration warning,

                    SE001=Historical error,

                    ST001=Historical full delivery error.

                    Note: these are the actual COD_MAIL values in GDP_MAIL table.

                    '
      responses:
        '200':
          description: Mail payload prepared
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailComposition'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/acquisizioni/{idLog}/mail/invia:
    parameters:
      - $ref: '#/components/parameters/idLog'
    post:
      tags:
        - bo-acquisizioni
      operationId: postBoAcquisizioneMailInvia
      summary: Actually send the prepared mail
      description: 'Sends the email using the payload provided (which may have been
        edited by the operator).

        Delegates to `F22 — MONITOR.invioMAIL`.

        '
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MailComposition'
      responses:
        '200':
          description: Mail sent successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          description: Internal server error — mail send failed
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /bo/acquisizioni/{idLog}/retry:
    parameters:
      - $ref: '#/components/parameters/idLog'
    post:
      tags:
        - bo-acquisizioni
      operationId: postBoAcquisizioneRetry
      summary: Re-enqueue edition for DAM retransmission
      description: 'Increments retry count and sets transmission task to READY.

        Enforces NRO_MAX_TENTATIVI limit.

        Delegates to `F21 — MONITOR.attivaCODA` on gdporch.

        '
      security:
        - bearerAuth:
            - operatore
      responses:
        '202':
          description: Accepted — edition re-enqueued
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — maximum retry attempts exceeded
  /bo/acquisizioni/{idLog}/file:
    parameters:
      - $ref: '#/components/parameters/idLog'
    get:
      tags:
        - bo-acquisizioni
      operationId: getBoAcquisizioneFile
      summary: Download acquisition files (SHOULD)
      description: Access SFTP directly via gdporch. Priority — SHOULD.
      security:
        - bearerAuth:
            - operatore
      responses:
        '200':
          description: File content
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /bo/pagine/{idPagina}/oblio:
    parameters:
      - name: idPagina
        in: path
        required: true
        schema:
          type: integer
          format: int32
    post:
      tags:
        - bo-pagine
      operationId: postBoOblio
      summary: Initiate GDPR oblio on a page
      description: 'Calls DAM LIBRA API to obscure page content, then sets

        GDP_PAGINA.OBLIO=true, DATA_OBLIO=NOW(), NOTA_OBLIO.

        operatore role only — 403 for utentePrivilegiato or utenteWeb.

        '
      security:
        - bearerAuth:
            - operatore
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OblioRequest'
      responses:
        '202':
          description: Accepted — oblio process started
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    get:
      tags:
        - bo-pagine
      operationId: getBoOblioStatus
      summary: Check oblio status of a page
      description: operatore role only.
      security:
        - bearerAuth:
            - operatore
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OblioStatus'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /fo/ricerca:
    get:
      tags:
        - fo-ricerca
      operationId: getFoRicerca
      summary: Full-text archive search
      security:
        - bearerAuth: []
        - {}
      description: 'Delegates to DAM LIBRA search API.

        Applies last-2-editions filter for utenteWeb:

        editions with DATA_PUBBLICAZIONE > CURRENT_DATE are excluded.

        Performance target: p95 < 2s at 30 concurrent users.

        NOTE: LIBRA search API not yet documented — OPEN-1.

        '
      parameters:
        - name: q
          in: query
          required: true
          description: Search text
          schema:
            type: string
            minLength: 1
        - name: dataInizio
          in: query
          schema:
            type: string
            format: date
        - name: dataFine
          in: query
          schema:
            type: string
            format: date
        - name: provincia
          in: query
          schema:
            type: string
        - name: idTestata
          in: query
          schema:
            type: integer
            format: int32
        - name: areaTematica
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RicercaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /fo/ricerca/avanzata:
    get:
      tags:
        - fo-ricerca
      operationId: getFoRicercaAvanzata
      summary: Advanced archive search
      security:
        - bearerAuth: []
        - {}
      description: 'Adds AND/OR/EXACT operator parameter over /fo/ricerca.

        Same visibility rules apply.

        '
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
            minLength: 1
        - name: modalita
          in: query
          required: true
          schema:
            type: string
            enum:
              - AND
              - OR
              - EXACT
        - name: dataInizio
          in: query
          schema:
            type: string
            format: date
        - name: dataFine
          in: query
          schema:
            type: string
            format: date
        - name: provincia
          in: query
          schema:
            type: string
        - name: idTestata
          in: query
          schema:
            type: integer
            format: int32
        - name: areaTematica
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RicercaResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /fo/testate:
    get:
      tags:
        - fo-testate
      operationId: getFoTestate
      summary: List consultable testate
      security:
        - bearerAuth: []
        - {}
      description: Direct DB read from GDP_TESTATA.
      parameters:
        - name: provincia
          in: query
          schema:
            type: string
        - name: attive
          in: query
          schema:
            type: boolean
        - name: areaTematica
          in: query
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestataSummaryList'
  /fo/testate/{idTestata}:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    get:
      tags:
        - fo-testate
      operationId: getFoTestataById
      summary: Public testata data
      security:
        - bearerAuth: []
        - {}
      description: Returns only public fields (name, description, province, periodicity).
        NOT SFTP config.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestataPublic'
        '404':
          $ref: '#/components/responses/NotFound'
  /fo/testate/{idTestata}/edizioni:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    get:
      tags:
        - fo-testate
      operationId: getFoEdizioniByTestata
      summary: List editions of a testata
      security:
        - bearerAuth: []
        - {}
      description: 'Direct DB read from GDP_EDIZIONE.

        Applies last-2-editions filter for utenteWeb

        (DATA_PUBBLICAZIONE > CURRENT_DATE excluded).

        '
      parameters:
        - name: dataInizio
          in: query
          schema:
            type: string
            format: date
        - name: dataFine
          in: query
          schema:
            type: string
            format: date
        - name: page
          in: query
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdizioneList'
        '404':
          $ref: '#/components/responses/NotFound'
  /fo/edizioni/{idEdizione}:
    parameters:
      - $ref: '#/components/parameters/idEdizione'
    get:
      tags:
        - fo-edizioni
      operationId: getFoEdizioneById
      summary: Edition detail with page list and metadata
      security:
        - bearerAuth: []
        - {}
      description: 'Direct DB read from GDP_EDIZIONE + GDP_PAGINA.

        If utenteWeb and edition is within last 2 → 403.

        '
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdizioneDetail'
        '403':
