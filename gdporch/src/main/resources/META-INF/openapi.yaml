openapi: 3.1.0
info:
  title: gdporch — Orchestrator Internal API
  description: 'Internal REST APIs exposed by gdporch (Acquisition Orchestrator).

    System: GDP — Giornali del Piemonte.

    Version: 1.0 (March 2026).


    ## Consumers

    - gdpbff calls the MONITOR group (F12-F15, F18, F20-F22) and FTPregolare group
    (F01, F05)

    - Internal scheduled jobs call the acquisition group (F04, F08, F09) asynchronously


    ## Endpoint Groups


    ### FTPregolare — called by gdpbff

    - `POST /orch/testate/date-attese` — F01 configDTEdizioneAttesa (async)

    - `POST /orch/testate/{id}/sospensioni` — F05 sospensioneEdizioneAttesa (sync)

    - `GET  /orch/testate/date-attese` — F18 verifDateAttese (sync)


    ### MONITOR — called by gdpbff

    - `GET  /orch/acquisizioni` — F12 elencoAcquisizioni

    - `GET  /orch/acquisizioni/{idLog}` — F13 dettaglioAcquisizione

    - `POST /orch/acquisizioni/{idLog}/mail/prepara` — F14 preparaMAIL

    - `GET  /orch/acquisizioni/ricerca` — F15 ricercaAcquisizioni

    - `GET  /orch/acquisizioni/{idLog}/stato-dam` — F20 statoDAM

    - `POST /orch/acquisizioni/{idLog}/coda` — F21 attivaCODA

    - `POST /orch/acquisizioni/{idLog}/mail/invia` — F22 invioMAIL


    ### DB/DAM — internal async (F03→F04→F08→F09→F10)

    - `POST /api/internal/acquisizioni/{idLog}/valida` — F04

    - `POST /api/internal/testate/{id}/edizioni/inserisci` — F08

    - `POST /api/internal/testate/{id}/edizioni/{idEd}/trasmetti` — F09


    ## Security

    All endpoints secured with internal service token (X-Service-Token header).

    Internal endpoints (/api/internal/**) are on a private network — no external exposure.'
  version: 1.0.0
  contact:
    name: CSI Piemonte — Team GDP
servers:
  - url: http://gdporch:8082
    description: Internal Kubernetes service
tags:
  - name: orch-ftpregolare
    description: FTPregolare — Date attese and suspensions (called by gdpbff)
  - name: orch-monitor
    description: MONITOR — Acquisition monitoring (called by gdpbff)
  - name: orch-internal
    description: Internal acquisition pipeline (F04, F08, F09 — async)
security:
  - serviceTokenAuth: []
paths:
  /orch/testate:
    get:
      tags:
        - orch-monitor
      operationId: orchElencoTestate
      summary: F16 — DB.getElencoTestate
      description: Returns list of testate with optional mutually-exclusive filters.
        Synchronous. Called by gdpbff for GET /bo/testate.
      parameters:
        - name: invioEdizione
          in: query
          description: Filter senders only (true=solo invianti)
          schema:
            type: boolean
        - name: prov
          in: query
          description: Filter by province code (e.g. TO, CN)
          schema:
            type: string
        - name: idTestata
          in: query
          description: Filter by specific testata ID
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestataSummaryList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /orch/testate/date-attese:
    get:
      tags:
        - orch-ftpregolare
      operationId: orchVerifDateAttese
      summary: F18 — FTPregolare.verifDateAttese
      description: 'Returns expected dates with suspension status for a period.

        Synchronous. Called by gdpbff for /bo/testate/{id}/date-attese and /bo/testate/{id}/sospensioni
        (GET).'
      parameters:
        - name: dataInizio
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: dataFine
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: idTestata
          in: query
          required: false
          description: If omitted, all testate with INVIO_EDIZIONE=true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DateAtteseList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
    post:
      tags:
        - orch-ftpregolare
      operationId: orchConfigDTEdizioneAttesa
      summary: F01 — FTPregolare.configDTEdizioneAttesa
      description: 'Calculate and persist expected edition dates for a period.

        Asynchronous. Called by gdpbff for PUT /bo/testate/{id}/periodicita and POST
        /bo/testate/{id}/date-attese.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DateRangeRequest'
      responses:
        '202':
          description: Accepted — processing started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AsyncJobResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /orch/testate/{idTestata}/sospensioni:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    post:
      tags:
        - orch-ftpregolare
      operationId: orchSospensioneEdizioneAttesa
      summary: F05 — FTPregolare.sospensioneEdizioneAttesa
      description: 'Suspend expected editions for a date range.

        Synchronous. Called by gdpbff for POST /bo/testate/{id}/sospensioni.

        Returns giorniEdizione = number of dates suspended.

        Sets GDP_DATA_USCITA.SOSPESA=true and GDP_PERIODICITA suspension range.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DateRangeRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SospensioneResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
  /orch/acquisizioni:
    get:
      tags:
        - orch-monitor
      operationId: orchElencoAcquisizioni
      summary: F12 — MONITOR.elencoAcquisizioni
      description: 'Returns acquisition list for a given date and type.

        Synchronous. Called by gdpbff for GET /bo/acquisizioni.

        Joins GDP_LOG + GDP_TESTATA + GDP_EDIZIONE + GDP_LOG_EDIZIONE.'
      parameters:
        - name: tipoAcquisizione
          in: query
          required: true
          description: G=giornaliera, S=storica
          schema:
            type: string
            enum:
              - G
              - S
        - name: dataAcquisizione
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisizioneList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /orch/acquisizioni/ricerca:
    get:
      tags:
        - orch-monitor
      operationId: orchRicercaAcquisizioni
      summary: F15 — MONITOR.ricercaAcquisizioni
      description: Historical multi-criteria search. Called by gdpbff for GET /bo/acquisizioni/ricerca.
      parameters:
        - name: tipoAcquisizione
          in: query
          required: true
          schema:
            type: string
            enum:
              - G
              - S
        - name: idTestata
          in: query
          required: true
          schema:
            type: integer
            format: int32
        - name: dataDA
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: dataA
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: tipoEdizione
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/TipoEdizione'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisizioneRicercaList'
        '400':
          $ref: '#/components/responses/BadRequest'
  /orch/acquisizioni/{idLog}:
    parameters:
      - $ref: '#/components/parameters/idLog'
    get:
      tags:
        - orch-monitor
      operationId: orchDettaglioAcquisizione
      summary: F13 — MONITOR.dettaglioAcquisizione
      description: 'Full detail of a single acquisition.

        Called by gdpbff for GET /bo/acquisizioni/{idLog} and GET /bo/acquisizioni/{idLog}/edizioni-storiche.

        Joins GDP_LOG + GDP_LOG_EDIZIONE + GDP_TESTATA + GDP_EDIZIONE.

        tipoEdizione decoded via GDP_TIPO_EDIZIONE.DESCRIZIONE lookup.'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcquisizioneDetail'
        '404':
          $ref: '#/components/responses/NotFound'
  /orch/acquisizioni/{idLog}/stato-dam:
    parameters:
      - $ref: '#/components/parameters/idLog'
    get:
      tags:
        - orch-monitor
      operationId: orchStatoDAM
      summary: F20 — MONITOR.statoDAM
      description: 'Check DAM LIBRA processing status for a job.

        Calls LIBRA GET /api/v2/success?jobId=... and returns status.

        Called by gdpbff for GET /bo/acquisizioni/{idLog}/stato-dam.'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DamStatusResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '503':
          $ref: '#/components/responses/ServiceUnavailable'
  /orch/acquisizioni/{idLog}/coda:
    parameters:
      - $ref: '#/components/parameters/idLog'
    post:
      tags:
        - orch-monitor
      operationId: orchAttivaCODA
      summary: F21 — MONITOR.attivaCODA
      description: 'Re-enqueue a failed DAM transmission for retry.

        Sets GDP_CODA_CARICAMENTO.STATO=READY, increments NRO_TENTATIVO.

        Returns 409 if NRO_TENTATIVO >= NRO_MAX_TENTATIVI (default 10).

        Called by gdpbff for POST /bo/acquisizioni/{idLog}/retry.'
      responses:
        '200':
          description: OK — retry enqueued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericProcessResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Conflict — maximum retry attempts exceeded (NRO_MAX_TENTATIVI=10)
  /orch/acquisizioni/{idLog}/mail/prepara:
    parameters:
      - $ref: '#/components/parameters/idLog'
    post:
      tags:
        - orch-monitor
      operationId: orchPreparaMAIL
      summary: F14 — MONITOR.preparaMAIL
      description: 'Compose email payload from GDP_MAIL template — does NOT send.

        Reads recipient from GDP_UTENTESFTP.EMAIL via GDP_LOG.FK_GDP_UTENTEFTP.

        Substitutes <[dataED]> and <[nomeTestata]> placeholders.

        Called by gdpbff for POST /bo/acquisizioni/{idLog}/mail/prepara.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - tipoMail
              properties:
                tipoMail:
                  type: string
                  enum:
                    - GW001
                    - GE001
                    - SW001
                    - SE001
                    - ST001
                  description: 'COD_MAIL from GDP_MAIL table.

                    GW001=Daily warning (edizione da integrare)

                    GE001=Daily error (edizione non caricata)

                    SW001=Historical warning

                    SE001=Historical error

                    ST001=Historical full delivery error'
      responses:
        '200':
          description: Mail payload composed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MailComposition'
        '404':
          $ref: '#/components/responses/NotFound'
  /orch/acquisizioni/{idLog}/mail/invia:
    parameters:
      - $ref: '#/components/parameters/idLog'
    post:
      tags:
        - orch-monitor
      operationId: orchInvioMAIL
      summary: F22 — MONITOR.invioMAIL
      description: 'Send email using the payload from F14.

        Operator may have edited oggetto and testo before this call.

        Called by gdpbff for POST /bo/acquisizioni/{idLog}/mail/invia.'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MailComposition'
      responses:
        '200':
          description: Mail sent successfully
        '500':
          description: Mail send failed
  /api/internal/acquisizioni/{idLog}/valida:
    parameters:
      - $ref: '#/components/parameters/idLog'
    post:
      tags:
        - orch-internal
      operationId: orchInternalValidaEdizione
      summary: F04 — FTPregolare.ctrlEdizioneAcquisita
      description: 'Full PDF-level validation pipeline for a periodic edition.

        Called asynchronously by F03 (checkEdizioneAttesa scheduler).

        Validates date, splits multi-page PDFs, checks readability and naming,

        extracts text, runs heuristic checks, writes GDP_LOG_EDIZIONE,

        then calls F08 (sync) and F09 (sync) → F10 (async).

        NOT called by gdpbff.'
      parameters:
        - name: idTestata
          in: query
          required: true
          schema:
            type: integer
            format: int32
        - name: cartellaTestata
          in: query
          required: true
          schema:
            type: string
        - name: dataEdizione
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericProcessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/internal/testate/{idTestata}/edizioni/inserisci:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    post:
      tags:
        - orch-internal
      operationId: orchInternalInsEdizione
      summary: F08 — DB.insEdizione
      description: 'Insert or update GDP_EDIZIONE + GDP_PAGINA records for an edition.

        Synchronous. Called by F04 (periodic) and F07 (historical).

        Full transactional — rollback both EDIZIONE and all PAGINA on failure.

        Calculates DATA_PUBBLICAZIONE = DATA_EDIZIONE + gg(periodicità).

        NOT called by gdpbff.'
      parameters:
        - name: path
          in: query
          required: true
          description: Staging SFTP path
          schema:
            type: string
        - name: dataEdizione
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: idLog
          in: query
          required: true
          schema:
            type: integer
            format: int32
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EdizioneInsertResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /api/internal/testate/{idTestata}/edizioni/{idEdizione}/trasmetti:
    parameters:
      - $ref: '#/components/parameters/idTestata'
      - $ref: '#/components/parameters/idEdizione'
    post:
      tags:
        - orch-internal
      operationId: orchInternalCreaXML
      summary: F09 — DAMtrasmissione.creaXMLEdizione
      description: 'Generate XML metadata + .zip package and deposit in /_dam/.

        Synchronous. Called by F04 and F07 after successful F08.

        On success: inserts GDP_CODA_CARICAMENTO with STATO=PRO, returns zip filename.

        Caller (F04/F07) then invokes F10 asynchronously.

        NOT called by gdpbff.'
      parameters:
        - name: idLog
          in: query
          required: true
          schema:
            type: integer
            format: int32
        - name: priorita
          in: query
          required: true
          description: 0=daily editions, 100=historical editions
          schema:
            type: integer
            format: int32
            enum:
              - 0
              - 100
      responses:
        '200':
          description: OK — zip created and queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/XmlCreationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
  /orch/testate/{idTestata}:
    parameters:
      - $ref: '#/components/parameters/idTestata'
    get:
      tags:
        - orch-monitor
      operationId: orchGetTestata
      summary: F17 — DB.getTestata
      description: Returns all GDP_TESTATA fields. Synchronous. Called by gdpbff for
        GET /bo/testate/{idTestata}.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TestataDetail'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
components:
  securitySchemes:
    serviceTokenAuth:
      type: apiKey
      in: header
      name: X-Service-Token
      description: Internal service token injected via env var SERVICE_TOKEN
  parameters:
    idTestata:
      name: idTestata
      in: path
      required: true
      schema:
        type: integer
        format: int32
    idLog:
      name: idLog
      in: path
      required: true
      schema:
        type: integer
        format: int32
    idEdizione:
      name: idEdizione
      in: path
      required: true
      schema:
        type: integer
        format: int32
  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid JWT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but insufficient role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServiceUnavailable:
      description: Backend system unavailable (gdporch or DAM LIBRA)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ErrorResponse:
      type: object
      required:
        - codice
        - messaggio
        - timestamp
      properties:
        codice:
          type: string
          enum:
            - BACKEND_UNAVAILABLE
            - VALIDATION_ERROR
            - NOT_FOUND
            - FORBIDDEN
            - INTERNAL_ERROR
          example: VALIDATION_ERROR
        messaggio:
          type: string
          example: Parametro obbligatorio mancante
        dettagli:
          type: array
          items:
            $ref: '#/components/schemas/ErrorDetail'
        timestamp:
          type: string
          format: date-time
          example: '2026-03-01T10:00:00Z'
    ErrorDetail:
      type: object
      properties:
        campo:
          type: string
          example: dataInizio
        errore:
          type: string
          example: Il campo è obbligatorio
    AsyncJobResponse:
      type: object
      required:
        - jobId
        - status
      properties:
        jobId:
          type: string
          example: a3f2c1d0-1234-5678-abcd-ef0123456789
        message:
          type: string
          example: Processing started
        status:
          type: string
          enum:
            - PROCESSING
            - COMPLETED
            - FAILED
          example: PROCESSING
    DateRangeRequest:
      type: object
      required:
        - dataInizio
        - dataFine
      properties:
        dataInizio:
          type: string
          format: date
          example: '2026-01-01'
        dataFine:
          type: string
          format: date
          example: '2026-12-31'
        idTestata:
          type: integer
          format: int32
          nullable: true
    TestataSummary:
      type: object
      required:
        - idTestata
        - nomeTestata
        - cartellaTestata
      properties:
        idTestata:
          type: integer
          format: int32
          example: 1
        nomeTestata:
          type: string
          example: La Sentinella del Canavese
        cartellaTestata:
          type: string
          example: sentinella
        invioEdizione:
          type: boolean
          example: true
        provincia:
          type: string
          example: TO
    TestataSummaryList:
      type: object
      required:
        - testate
      properties:
        testate:
          type: array
          items:
            $ref: '#/components/schemas/TestataSummary'
    TipoEdizione:
      type: string
      enum:
        - OK
        - AN
        - PO
        - SO
        - AA
        - ST
        - AS
      description: 'OK=Regolare (Corrispondente), AN=Anticipataria, PO=Posticipataria,

        SO=Sospesa, AA=Anomala edizione attesa, ST=Storica, AS=Anomala storica

        '
    GenericProcessResponse:
      type: object
      required:
        - codice
      properties:
        codice:
          type: string
          example: MSG00009
          description: 'Process result code (MSG00009=OK, MSG00001=Date Anomaly, etc.)

            '
        messaggio:
          type: string
          example: Elaborazione OK
          description: Human readable description or error detail.
    EdizioneInsertResponse:
      type: object
      required:
        - codice
        - idEdizione
      properties:
        codice:
          type: string
          example: MSG00009
          description: Process result code (MSG00009=OK, MSG00001=Date Anomaly, etc.)
        messaggio:
          type: string
          example: Elaborazione OK
          description: Human readable description or error detail.
        idEdizione:
          type: integer
          format: int32
          example: 12345
          description: ID of the inserted or updated edition (GDP_EDIZIONE.ID_GDP_EDIZIONE).
    XmlCreationResponse:
      type: object
      required:
        - codice
        - nomeFileCompresso
      properties:
        codice:
          type: string
          example: MSG00009
          description: Process result code (MSG00009=OK, MSG00001=Date Anomaly, etc.)
        messaggio:
          type: string
          example: Elaborazione OK
          description: Human readable description or error detail.
        nomeFileCompresso:
          type: string
          example: LaSentinellaDelCanavese.2026-03-01.zip
          description: Generated ZIP filename deposited in the DAM staging area.
    SospensioneResponse:
      type: object
      required:
        - giorniSospesi
        - message
      properties:
        giorniSospesi:
          type: integer
          example: 5
        message:
          type: string
          example: Editions suspended successfully
    DateAtteseList:
      type: object
      required:
        - testate
      properties:
        testate:
          type: array
          items:
            $ref: '#/components/schemas/DateAttesePerTestata'
    DateAttesePerTestata:
      type: object
      required:
        - idTestata
        - cartellaTestata
      properties:
        idTestata:
          type: integer
          format: int32
        cartellaTestata:
          type: string
          description: Added in SFU-01 v2
        dateAttese:
          type: array
          items:
            $ref: '#/components/schemas/DataAttesa'
        nroEdizioniAttese:
          type: integer
    DataAttesa:
      type: object
      required:
        - data
        - sospesa
      properties:
        data:
          type: string
          format: date
          example: '2026-03-01'
        sospesa:
          type: boolean
          example: false
    AcquisizioneList:
      type: object
      required:
        - acquisizioni
      properties:
        acquisizioni:
          type: array
          items:
            $ref: '#/components/schemas/AcquisizioneSummary'
    AcquisizioneSummary:
      type: object
      required:
        - idLog
      properties:
        idLog:
          type: integer
          format: int32
        idUtenteSFTP:
          type: integer
          format: int32
        idTestata:
          type: integer
          format: int32
        nomeTestata:
          type: string
          example: La Sentinella del Canavese
        nroEdizioni:
          type: integer
          description: Always 1 for tipo=G; count of GDP_LOG_EDIZIONE for tipo=S
        tipoEdizione:
          type: string
          description: Human-readable description from GDP_TIPO_EDIZIONE.
          example: Regolare
        dataEdizione:
          type: string
          format: date
        dataAcquisizione:
          type: string
          format: date-time
        nroTotFile:
          type: integer
        esito:
          type: string
          example: <MSG>Elaborazione OK</MSG>
          description: 'Raw status string containing rendering tags mapping to UC-05:

            <MSG> = OK (white text, green background)

            <WRN> = Warning (blue text, yellow background)

            <Ennn> = Error (yellow text, red background)

            '
