# ==========================================
# Test-specific overrides for @QuarkusTest
# ==========================================

# DevServices MUST be OFF by default:
# - Unit tests use @TestProfile(MockBeansTestProfile) which mocks all beans → no DB needed
# - Integration tests use IntegrationTestResource (Testcontainers) → manages its own Postgres
# Having this ON causes Quarkus build augmentation to attempt its own Docker Postgres first,
# which then blocks Testcontainers from working (Docker env "already failed" error).
quarkus.datasource.devservices.enabled=false
quarkus.hibernate-orm.database.generation=none
# Dummy datasource — no real connection made in unit tests (repositories are @InjectMock)
# Integration tests use existing Docker containers if detected on 5432/2222
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/gdp_db
quarkus.datasource.username=gdp_user
quarkus.datasource.password=gdp_password

# SFTP dummy values — overridden by integration test classes
sftp.host=localhost
sftp.port=2222
sftp.username=tester
sftp.password=password
sftp.root.prefix=upload/

# Libra REST client dummy URL — overridden by WireMock in integration tests
libra.api.url=http://localhost:9999

# Disable OpenTelemetry export in tests (avoids connection errors)
quarkus.otel.sdk.disabled=true

# Disable scheduled jobs during unit tests
quarkus.scheduler.enabled=false
